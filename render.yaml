services:
  - type: web
    name: theralign-api
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false      # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://your-vercel-app.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false      # Optional — AI degrades gracefully without it
      - key: EMAIL_HOST
        sync: false      # Optional (defaults to Gmail)
      - key: EMAIL_PORT
        sync: false      # Optional
      - key: EMAIL_SECURE
        sync: false      # Optional
      - key: EMAIL_USER
        sync: false      # Required for mail dispatches
      - key: EMAIL_PASS
        sync: false      # Required for mail dispatches
      - key: EMAIL_FROM
        sync: false      # Required for mail dispatches
